<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Main App -->
    <div id="app" class="app">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <button class="btn-icon" onclick="createNewChat()" title="New chat">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                </button>
                <span class="sidebar-title">Conversations</span>
                <button class="btn-icon" onclick="toggleSidebar()" title="Close sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 18l-6-6 6-6"/>
                    </svg>
                </button>
            </div>
            <div class="sidebar-search">
                <input type="text" id="search-input" placeholder="Search conversations..." oninput="searchConversations(this.value)">
            </div>
            <div id="conversation-list" class="conversation-list"></div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="top-bar">
                <button class="btn-icon sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12h18M3 6h18M3 18h18"/>
                    </svg>
                </button>
                <div class="model-selector">
                    <select id="provider-select" onchange="onProviderChange()"></select>
                    <select id="model-select"></select>
                </div>
                <button class="btn-icon" onclick="toggleSettings()" title="Settings">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
                    </svg>
                </button>
            </header>

            <!-- Settings Panel -->
            <div id="settings-panel" class="settings-panel hidden">
                <div class="settings-content">
                    <h3>Chat Settings</h3>
                    <div class="form-group">
                        <label for="system-prompt">System Prompt</label>
                        <textarea id="system-prompt" rows="3" placeholder="You are a helpful assistant..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="temperature-slider">Temperature: <span id="temp-value">0.7</span></label>
                        <input type="range" id="temperature-slider" min="0" max="2" step="0.1" value="0.7" oninput="document.getElementById('temp-value').textContent=this.value">
                    </div>
                    <div class="form-group">
                        <label for="max-tokens-input">Max Tokens</label>
                        <input type="number" id="max-tokens-input" value="4096" min="1" max="8192">
                    </div>
                    <button class="btn-secondary" onclick="toggleSettings()">Close</button>
                </div>
            </div>

            <!-- Chat Area -->
            <div id="chat-area" class="chat-area">
                <!-- Welcome screen -->
                <div id="welcome-screen" class="welcome-screen">
                    <svg width="48" height="48" viewBox="0 0 40 40" fill="none">
                        <circle cx="20" cy="20" r="20" fill="#E8D5B7"/>
                        <path d="M13 28L20 12L27 28" stroke="#8B6914" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <line x1="15.5" y1="23" x2="24.5" y2="23" stroke="#8B6914" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <h2>How can I help you today?</h2>
                    <div class="welcome-suggestions">
                        <button class="suggestion-card" onclick="sendSuggestion('Explain quantum computing in simple terms')">
                            <span class="suggestion-icon">💡</span>
                            <span>Explain quantum computing in simple terms</span>
                        </button>
                        <button class="suggestion-card" onclick="sendSuggestion('Write a Python function to sort a list')">
                            <span class="suggestion-icon">💻</span>
                            <span>Write a Python function to sort a list</span>
                        </button>
                        <button class="suggestion-card" onclick="sendSuggestion('Help me brainstorm ideas for a mobile app')">
                            <span class="suggestion-icon">🚀</span>
                            <span>Help me brainstorm ideas for a mobile app</span>
                        </button>
                        <button class="suggestion-card" onclick="sendSuggestion('What are best practices for API security?')">
                            <span class="suggestion-icon">🔒</span>
                            <span>What are best practices for API security?</span>
                        </button>
                    </div>
                </div>

                <!-- Messages container -->
                <div id="messages-container" class="messages-container hidden"></div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea
                        id="message-input"
                        placeholder="Message AI Chat..."
                        rows="1"
                        onkeydown="handleInputKeydown(event)"
                        oninput="autoResize(this)"
                    ></textarea>
                    <button id="send-btn" class="send-btn" onclick="sendMessage()" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                        </svg>
                    </button>
                    <button id="stop-btn" class="stop-btn hidden" onclick="stopStreaming()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <rect x="6" y="6" width="12" height="12" rx="2"/>
                        </svg>
                    </button>
                </div>
                <p class="input-hint">AI can make mistakes. Verify important information.</p>
            </div>
        </main>
    </div>

    <!-- Context menu for conversations -->
    <div id="context-menu" class="context-menu hidden">
        <button onclick="renameConversation()">Rename</button>
        <button onclick="archiveConversation()">Archive</button>
        <button class="danger" onclick="deleteConversation()">Delete</button>
    </div>

    <script src="/js/markdown.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
